<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>log in page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #e6d3d6;
    font-family: Georgia, serif;
    text-align: center;

    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.top-stripe {
    height: 40px;
    background-color: #7a1f2b;
}

.pillar {
    position: fixed;
    top: 10px;
    height: 100vh;
    z-index: 0;
}

.left { left: -300px; }
.right { right: -300px; }

.card-box {
    display: inline-block;
    margin-top: 80px;
    background-color: #6f1d2a;
    padding: 30px;
    border-radius: 8px;
    width: 320px;
    color: white;
    position: relative;
    z-index: 5;
}

.title {
    font-size: 24px;
    margin-bottom: 20px;
}

.form-control {
    background-color: #1e1e1e;
    color: white;
    border: 1px solid #444;
}

.btn-login {
    width: 100%;
    margin-top: 20px;
    background-color: #cfcfcf;
    border: none;
    color: black;
}

footer {
    background:#7a1f2b;
    color:#fff;
    text-align:center;
    padding:10px;
    font-size:14px;
    margin-top: auto;
}
</style>
</head>

<body>

<div style="flex:1;">

    <div class="top-stripe"></div>

    <img src="https://www.freepnglogos.com/uploads/pillar-png/greek-pillar-png-25.png" class="pillar left">
    <img src="https://www.freepnglogos.com/uploads/pillar-png/greek-pillar-png-25.png" class="pillar right">

    <div style="text-align:center; margin-top:20px;">
        <img src="https://files.catbox.moe/7x5vli.png" style="height:500px; width: 500px">
    </div>

    <div class="card-box">

        <br><br>

        <div class="title">Student Login</div>

        <input id="username" type="text" class="form-control mb-3" placeholder="Student ID #">

        <input id="password" type="password" class="form-control mb-3" placeholder="Student PIN #">

        <button class="btn btn-login" onclick="login()">Log In</button>

        <div id="message" style="margin-top:10px; font-size:14px;"></div>

    </div>

</div>

<footer>
  <p>&copy; 2026 Colton University. All rights reserved.</p>
</footer>

<script>
let attempt_counter = 0;

function login() {

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");
    let loginBtn = document.querySelector(".btn-login");

    if (attempt_counter >= 3) {
        loginBtn.disabled = true;
        message.innerHTML = "Login locked. Too many attempts.";
        return false;
    }

    if (username !== "" && username === password) {

        alert("Login successful!");
        attempt_counter = 0;
        message.innerHTML = "";

        window.location.href = "notebooks.html";

    } else {

        attempt_counter++;

        message.innerHTML =
            "Incorrect username/password. Attempt " + attempt_counter + " of 3";

        if (attempt_counter >= 3) {
            alert("Too many attempts. Login locked.");
            loginBtn.disabled = true;
        }
    }

    return false;
}
</script>

</body>
</html>
