<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Grade 9 Virtual Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: #620d26;
            color: white;
            text-align: center;
        }
        body {
            background-color: #3d0212; 
        }

        .sidebar {
            background-color: #510a1f; color: white; min-height: 100vh; 
        }

        .notebook-card { 
            font-family: Hina Mincho;
            background-color: #620d26; 
            border-radius: 15px; 
            color: #FFD700;
            padding: 20px; 
            margin-bottom: 20px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }

        .notebook-card:hover {
            background-color: #8e1537;
            transform: translateY(-5px); 
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3) !important;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
    <div class="row">
    <div class="col-md-2 sidebar p-3" style="color: #FFD700; font-family: Hina Mincho;">
        <img src="">
        <br>
        <h2>Menu</h2>
            <br>
            <p>Dashboard</p>
            <p>Notebooks</p>
            <p>Tasks</p>
            <hr>
            <button class="btn btn-danger btn-sm" onclick="logout()" style="color: #FFD700;">Logout</button>
    </div>

    <div class="col-md-10 p-4">
        <h1 class="display-4" style="color: #FFD700; font-family: Hina Mincho;">Tasks</h1>

    <br>

    <div class="row mt-6">
    <div class="col-md-10">
        <div class="notebook-card shadow" onclick="checkSubject('Math')">
            <h2>Math</h2>
            <p>Quiz 18</p>
            <hr>
            <p>Deadline: May 4, 2026 | 2:31 PM</p>
        </div>
    </div>

    <div class="row mt-6">
    <div class="col-md-10">
        <div class="notebook-card shadow" onclick="checkSubject('Math')">
            <h2>Math</h2>
            <p>Drill 288408</p>
            <hr>
            <p>Deadline: May 4, 2026 | 2:31 PM</p>
        </div>
    </div>

    <div class="row mt-6">
    <div class="col-md-10">
        <div class="notebook-card shadow" onclick="checkSubject('Math')">
            <h2>Math</h2>
            <p>Linky Spoogle Noodle</p>
            <hr>
            <p>Deadline: May 4, 2026 | 2:31 PM</p>
        </div>
    </div>
    
    <div class="footer">
        <p>Hans Arada, Gian Ibit, Cameron Bufford - 9 Jade</p>
    </div>

    </div>

    <p id="status-msg" class="mt-3 text-muted"></p>

    </div>
    </div>
    </div>

<script>
    let studentName = "Student Name";
    let schoolYear = "2025-2026";

    function checkSubject(subjectName) {
        alert("Submitting " + subjectName + "File");
    
        document.getElementById("status-msg").innerHTML = "Current Subject: " + subjectName;
    }
</script>

</body>
</html>
